<svg width="900" height="745" viewBox="0 0 900 745" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: Arial, sans-serif; }
  .th  { font-size: 13px; font-weight: 700; fill: #1a1a1a; }
  .ts  { font-size: 11px; font-weight: 400; fill: #444; }
  .lbl { font-size: 10px; fill: #888; font-style: italic; }
  .hd  { font-size: 12px; font-weight: 700; fill: #fff; }
  .box-teal   { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.8; }
  .box-purple { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.8; }
  .box-coral  { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.8; }
  .box-amber  { fill: #FFF8ED; stroke: #854F0B; stroke-width: 0.8; }
  .box-gray   { fill: #F4F4F0; stroke: #5F5E5A; stroke-width: 0.8; }
  .hdr-teal   { fill: #0F6E56; }
  .hdr-purple { fill: #534AB7; }
  .hdr-coral  { fill: #993C1D; }
  .hdr-amber  { fill: #854F0B; }
  .hdr-gray   { fill: #5F5E5A; }
  .arr { stroke: #666; stroke-width: 1.2; fill: none; marker-end: url(#arr); }
  .sep { stroke: #ddd; stroke-width: 0.8; stroke-dasharray: 5 4; }
</style>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5"
          markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#666" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ── LAYER LABELS (far left) ─────────────────────────────── -->
<text class="lbl" transform="rotate(-90,14,82)" x="14" y="82" text-anchor="middle">ชั้นรับข้อมูล</text>
