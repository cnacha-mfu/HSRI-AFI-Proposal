<!-- Offline-first legend -->
<rect x="28" y="638" width="844" height="34" rx="5" fill="#FFF8ED" stroke="#854F0B" stroke-width="0.8" stroke-dasharray="5 3"/>
<text style="font-size:10px;fill:#854F0B;font-weight:700" x="40" y="652" text-anchor="start">† Offline-first design:</text>
<text style="font-size:10px;fill:#555" x="160" y="652" text-anchor="start">ระบบทำงานได้สมบูรณ์โดยไม่ต้องเชื่อมต่อ HIS — ข้อมูลเก็บใน SQLite บนอุปกรณ์; Sync กับ HIS อัตโนมัติเมื่อมีอินเทอร์เน็ต</text>
<text style="font-size:10px;fill:#555" x="40" y="665" text-anchor="start">รองรับ 3 โหมด: (1) Standalone — ไม่มีอินเทอร์เน็ต  (2) Cached — มีสัญญาณไม่สม่ำเสมอ  (3) Connected — เชื่อมต่อ HIS สด</text>
