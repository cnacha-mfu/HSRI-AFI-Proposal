<svg width="680" height="800" viewBox="0 0 680 800" xmlns="http://www.w3.org/2000/svg">
<style>
  .th { font-family: Arial, sans-serif; font-size: 13px; font-weight: 600; fill: #1a1a1a; }
  .ts { font-family: Arial, sans-serif; font-size: 11px; font-weight: 400; fill: #444; }
  .hdr { font-family: Arial, sans-serif; font-size: 13px; font-weight: 700; fill: #ffffff; }
  .arr { stroke: #666; stroke-width: 1.2; fill: none; marker-end: url(#arrow); }
  .dash { stroke: #aaa; stroke-width: 1; fill: none; stroke-dasharray: 4 3; marker-end: url(#arrow); }
  .sep { stroke: #ccc; stroke-width: 0.5; stroke-dasharray: 3 3; }
  .box-teal   { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.8; }
  .box-purple { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.8; }
  .box-amber  { fill: #FAEEDA; stroke: #854F0B; stroke-width: 0.8; }
  .box-gray   { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.8; }
  .hdr-teal   { fill: #0F6E56; }
  .hdr-purple { fill: #534AB7; }
  .hdr-amber  { fill: #854F0B; }
  .hdr-gray   { fill: #5F5E5A; }
  .diamond    { fill: #FFF3E0; stroke: #854F0B; stroke-width: 1; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Swimlane backgrounds -->
<rect x="30" y="30" width="148" height="720" rx="6" fill="#E1F5EE" opacity="0.25"/>
<rect x="186" y="30" width="148" height="720" rx="6" fill="#EEEDFE" opacity="0.2"/>
<rect x="342" y="30" width="148" height="720" rx="6" fill="#FAEEDA" opacity="0.2"/>
<rect x="498" y="30" width="152" height="720" rx="6" fill="#F1EFE8" opacity="0.25"/>

<!-- Swimlane headers -->
<rect x="30" y="30" width="148" height="36" rx="6" class="hdr-teal"/>
<text class="hdr" x="104" y="53" text-anchor="middle">Patient / CHW</text>

<rect x="186" y="30" width="148" height="36" rx="6" class="hdr-purple"/>
<text class="hdr" x="260" y="53" text-anchor="middle">AI system</text>

<rect x="342" y="30" width="148" height="36" rx="6" class="hdr-amber"/>
<text class="hdr" x="416" y="53" text-anchor="middle">Clinician</text>

<rect x="498" y="30" width="152" height="36" rx="6" class="hdr-gray"/>
<text class="hdr" x="574" y="53" text-anchor="middle">HIS / System</text>

<!-- Step 1: Patient arrives -->
<rect x="44" y="86" width="120" height="52" rx="8" class="box-teal"/>
<text class="th" x="104" y="107" text-anchor="middle">Patient arrives</text>
<text class="ts" x="104" y="123" text-anchor="middle">Fever ≥38°C</text>
<line x1="104" y1="138" x2="104" y2="166" class="arr"/>

<!-- Step 2: CHW opens app -->
<rect x="44" y="166" width="120" height="52" rx="8" class="box-teal"/>
<text class="th" x="104" y="187" text-anchor="middle">CHW opens app</text>
<text class="ts" x="104" y="203" text-anchor="middle">LINE OA / web</text>
<line x1="164" y1="192" x2="200" y2="192" class="arr"/>

<!-- Step 3: Pull HIS record (optional — dashed) -->
<rect x="200" y="166" width="120" height="52" rx="8" class="box-purple" stroke-dasharray="5 3" opacity="0.85"/>
<text class="th" x="260" y="184" text-anchor="middle">Pull HIS record †</text>
<text class="ts" x="260" y="199" text-anchor="middle">If connected</text>
<text class="ts" x="260" y="212" text-anchor="middle">(FHIR lookup)</text>
<line x1="320" y1="192" x2="510" y2="192" class="dash"/>
<rect x="510" y="166" width="128" height="52" rx="8" class="box-gray" stroke-dasharray="5 3" opacity="0.85"/>
<text class="th" x="574" y="184" text-anchor="middle">HIS response †</text>
<text class="ts" x="574" y="199" text-anchor="middle">Dx history, meds</text>
<text class="ts" x="574" y="212" text-anchor="middle">(if available)</text>
<line x1="510" y1="206" x2="320" y2="206" class="dash"/>
<line x1="260" y1="218" x2="260" y2="246" class="arr"/>
<line x1="104" y1="218" x2="104" y2="246" class="arr"/>

<!-- Step 4: Voice Q&A -->
<rect x="44" y="246" width="120" height="64" rx="8" class="box-teal"/>
<text class="th" x="104" y="265" text-anchor="middle">Answers questions</text>
<text class="ts" x="104" y="281" text-anchor="middle">By voice (Thai)</text>
<text class="ts" x="104" y="295" text-anchor="middle">or text input</text>
<line x1="164" y1="278" x2="200" y2="278" class="arr"/>

<!-- Step 5: ASR + NER -->
<rect x="200" y="246" width="120" height="64" rx="8" class="box-purple"/>
<text class="th" x="260" y="265" text-anchor="middle">ASR → NER</text>
<text class="ts" x="260" y="281" text-anchor="middle">Extract symptoms,</text>
<text class="ts" x="260" y="295" text-anchor="middle">exposure, duration</text>
<line x1="260" y1="310" x2="260" y2="338" class="arr"/>

<!-- Step 6: Risk model -->
<rect x="200" y="338" width="120" height="64" rx="8" class="box-purple"/>
<text class="th" x="260" y="357" text-anchor="middle">Risk model</text>
<text class="ts" x="260" y="373" text-anchor="middle">Bayesian + LLM</text>
<text class="ts" x="260" y="387" text-anchor="middle">Probability per Dx</text>
<line x1="260" y1="402" x2="260" y2="428" class="arr"/>

<!-- Diamond decision -->
<polygon points="260,430 325,462 260,494 195,462" class="diamond"/>
<text class="ts" x="260" y="457" text-anchor="middle" font-weight="600">Severity</text>
<text class="ts" x="260" y="471" text-anchor="middle" font-weight="600">level?</text>

<!-- Branch low -->
<path d="M195,462 L104,462 L104,480" class="arr"/>
<text style="font-family:Arial;font-size:10px;fill:#555" x="150" y="455" text-anchor="middle">Low</text>
<rect x="44" y="480" width="120" height="52" rx="8" class="box-teal"/>
<text class="th" x="104" y="500" text-anchor="middle">Manage locally</text>
<text class="ts" x="104" y="516" text-anchor="middle">Home care advice</text>

<!-- Branch high -->
<path d="M325,462 L416,462 L416,480" class="arr"/>
<text style="font-family:Arial;font-size:10px;fill:#555" x="373" y="455" text-anchor="middle">High</text>
<rect x="356" y="480" width="120" height="52" rx="8" class="box-amber"/>
<text class="th" x="416" y="500" text-anchor="middle">Refer to hospital</text>
<text class="ts" x="416" y="516" text-anchor="middle">+ referral note</text>

<!-- Converge -->
<line x1="104" y1="532" x2="245" y2="566" class="arr"/>
<line x1="416" y1="532" x2="275" y2="566" class="arr"/>

<!-- Step 8: Draft SOAP + AMR -->
<rect x="200" y="566" width="120" height="64" rx="8" class="box-purple"/>
<text class="th" x="260" y="585" text-anchor="middle">Draft SOAP</text>
<text class="ts" x="260" y="601" text-anchor="middle">+ AMR flag</text>
<text class="ts" x="260" y="615" text-anchor="middle">S/O/A auto-filled</text>
<line x1="320" y1="598" x2="356" y2="598" class="arr"/>

<!-- Step 9: Clinician reviews -->
<rect x="356" y="566" width="120" height="64" rx="8" class="box-amber"/>
<text class="th" x="416" y="585" text-anchor="middle">Review &amp; edit</text>
<text class="ts" x="416" y="601" text-anchor="middle">Complete Plan (P)</text>
<text class="ts" x="416" y="615" text-anchor="middle">One-click approve</text>
<line x1="476" y1="598" x2="510" y2="598" class="arr"/>

<!-- Step 10: Save locally + queue HIS sync -->
<rect x="510" y="566" width="128" height="64" rx="8" class="box-gray"/>
<text class="th" x="574" y="582" text-anchor="middle">Save locally</text>
<text class="ts" x="574" y="597" text-anchor="middle">SQLite on-device</text>
<text class="ts" x="574" y="611" text-anchor="middle">Queue HIS sync †</text>
<text class="ts" x="574" y="625" text-anchor="middle">Audit log entry</text>

<!-- Follow-up -->
<line x1="260" y1="630" x2="260" y2="658" class="arr"/>
<rect x="186" y="658" width="272" height="52" rx="8" class="box-gray"/>
<text class="th" x="322" y="679" text-anchor="middle">Outcome tracking &amp; follow-up alert</text>
<text class="ts" x="322" y="695" text-anchor="middle">Day 3 / Day 7 auto-ping to CHW</text>

<!-- Vertical separators -->
<line x1="178" y1="30" x2="178" y2="750" class="sep"/>
<line x1="334" y1="30" x2="334" y2="750" class="sep"/>
<line x1="490" y1="30" x2="490" y2="750" class="sep"/>

<!-- Offline-first note -->
<rect x="30" y="758" width="620" height="30" rx="5" fill="#FFF8ED" stroke="#854F0B" stroke-width="0.8" stroke-dasharray="5 3"/>
<text style="font-family:Arial;font-size:9.5px;font-weight:700;fill:#854F0B" x="42" y="770" text-anchor="start">† Offline-first:</text>
<text style="font-family:Arial;font-size:9.5px;fill:#555" x="138" y="770" text-anchor="start">Steps marked † require internet. System works fully without HIS — data saved locally and synced when connected.</text>
<text style="font-family:Arial;font-size:9.5px;fill:#555" x="42" y="782" text-anchor="start">Modes: Standalone (no internet) · Cached (intermittent) · Connected (live HIS sync)</text>
</svg>
